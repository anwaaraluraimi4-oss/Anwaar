        .academic-year { background: var(--secondary); color: white; display: inline-block; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }

        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e0e0e0; box-sizing: border-box; font-weight: bold; }

        .abs-check { width: 25px; height: 25px; cursor: pointer; }
        .submit-btn { background: linear-gradient(to left, #2e7d32, #43a047); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }

</head>

    function renderStudents() {
        const cls = document.getElementById('classSelect').value;
        const listDiv = document.getElementById('studentsList');
        listDiv.innerHTML = "";
        if(!cls) { document.getElementById('saveBtn').style.display = "none"; return; }
        document.getElementById('saveBtn').style.display = "block";
        dataGroups[cls].forEach((name) => {
            listDiv.innerHTML += `<div class="student-card"><span>👤 ${name}</span><input type="checkbox" class="abs-check" data-name="${name}"></div>`;
        });
    }

    document.getElementById('attendanceDate').valueAsDate = new Date();

    async function saveData() {
        const teacher = document.getElementById('teacherName').value;
        const cls = document.getElementById('classSelect').value;
        const date = document.getElementById('attendanceDate').value;
        
        if(!teacher || !cls) { alert("الرجاء اختيار المعلم والصف أولاً!"); return; }
        
        const absentStudents = [];
        document.querySelectorAll('.abs-check:checked').forEach(cb => {
            absentStudents.push(cb.getAttribute('data-name'));
        });

        const payload = {
            teacher: teacher,
            className: cls,
            date: date,
            absentStudents: absentStudents
        };

        const btn = document.getElementById('saveBtn');
        btn.innerText = "جاري الإرسال للسحابة... ⏳";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("✅ تم إرسال كشف غياب " + cls + " بنجاح إلى الإدارة.");
            location.reload(); 
        } catch (error) {
            alert("❌ حدث خطأ في الاتصال. حاول مرة أخرى.");
            btn.innerText = "📤 إرسال كشف الغياب للإدارة";
            btn.disabled = false;
        }
    }
